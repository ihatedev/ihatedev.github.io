<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Your Name</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body, html {
      height: 100%;
      overflow: hidden;
    }

    /* Background video */
    video {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: -1;
    }

    /* Center UI card */
    .card {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      
      background: rgba(0, 0, 0, 0.6);
      backdrop-filter: blur(10px);
      
      padding: 30px;
      border-radius: 20px;
      text-align: center;
      color: white;
      width: 300px;
    }

    .card img {
      width: 80px;
      border-radius: 50%;
      margin-bottom: 15px;
    }

    .card h1 {
      font-size: 22px;
      margin-bottom: 10px;
    }

    .card p {
      font-size: 14px;
      opacity: 0.8;
    }

    button {
      margin-top: 15px;
      padding: 8px 15px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      background: white;
    }
  </style>
</head>

<body>

  <!-- Background Video -->
  <video autoplay muted loop>
    <source src="background.mp4" type="video/mp4">
  </video>

  <!-- Music -->
  <audio id="music" loop>
    <source src="music.mp3" type="audio/mpeg">
  </audio>

  <!-- UI Card -->
  <div class="card">
    <img src="icon.png" alt="icon">
    <h1>Your Name</h1>
    <p>your bio here</p>

    <button onclick="toggleMusic()">Mute / Unmute</button>
  </div>

  <script>
    const music = document.getElementById("music");

    // Try autoplay after interaction
    document.body.addEventListener("click", () => {
      music.volume = 0.5;
      music.play();
    }, { once: true });

    function toggleMusic() {
      if (music.paused) {
        music.play();
      } else {
        music.pause();
      }
    }
  </script>

</body>
</html>
